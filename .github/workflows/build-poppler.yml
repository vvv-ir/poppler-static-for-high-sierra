name: Poppler_HighSierra_Static_Expert
on: [push, workflow_dispatch]

env:
  CACHE_REV: "p103" # Новый ключ для новой логики кэша
  OSXCROSS_ROOT: /home/runner/osxcross
  OSXCROSS_TARGET_DIR: /home/runner/osxcross/target
  INSTALL_DIR: ${{ github.workspace }}/deps_dist
  MACOS_MIN_VER: "10.13"
  SDK_VERSION: "10.15"
  OSXCROSS_TARGET: "darwin19"
  OSXCROSS_HOST: "x86_64-apple-darwin19"

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # JOB 1: Сборка и гарантированное сохранение Тулчейна
  # ════════════════════════════════════════════════════════════════════════
  prepare_toolchain:
    runs-on: ubuntu-22.04
    outputs:
      cache-hit: ${{ steps.cache-osxcross.outputs.cache-hit }}
    steps:
      - name: ♻️ Check/Restore Osxcross
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}

      - name: 🔨 Build Osxcross (Only if not cached)
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-dev uuid-dev libssl-dev bash
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          mkdir -p tarballs
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/${{ env.SDK_VERSION }}/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz \
               -o tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz
          UNATTENDED=1 OSX_VERSION_MIN=${{ env.MACOS_MIN_VER }} ./build.sh
      
      # Если мы дошли сюда и собрали osxcross — кэш сохранится автоматически,
      # так как эта Job завершится успешно, даже если Poppler потом упадет.

  # ════════════════════════════════════════════════════════════════════════
  # JOB 2: Сборка Poppler (Использует кэш из Job 1)
  # ════════════════════════════════════════════════════════════════════════
  build_poppler:
    needs: prepare_toolchain
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install Host Tools
        run: sudo apt-get update && sudo apt-get install -y nasm yasm cmake make pkg-config gperf

      - name: ♻️ Restore Osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}
          fail-on-cache-miss: true

      - name: ⚙️ Fix Toolchain Paths
        run: |
          echo "${{ env.OSXCROSS_TARGET_DIR }}/bin" >> $GITHUB_PATH
          {
            echo "OSXCROSS_CONF=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake"
            echo "OSXCROSS_SDK=macosx${{ env.SDK_VERSION }}"
            echo "MACOSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }}"
            echo "PKG_CONFIG_PATH=${{ env.INSTALL_DIR }}/lib/pkgconfig"
          } >> $GITHUB_ENV

      - name: 📚 Build Dependencies (The Big Four)
        run: |
          export PATH="${{ env.OSXCROSS_TARGET_DIR }}/bin:$PATH"
          mkdir -p ${{ env.INSTALL_DIR }}
          
          echo "🔨 1/4 Сборка LIBJPEG-TURBO..."
          git clone --depth 1 https://github.com/libjpeg-turbo/libjpeg-turbo.git
          cd libjpeg-turbo && mkdir build && cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DENABLE_SHARED=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) install && cd ../..

          echo "🔨 2/4 Сборка FREETYPE (Критично для Poppler)..."
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git
          cd freetype && mkdir build && cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) install && cd ../..

          echo "🔨 3/4 Сборка LIBPNG..."
          git clone --depth 1 https://github.com/glennrp/libpng.git
          cd libpng && ./autogen.sh
          ./configure --host=${{ env.OSXCROSS_HOST }} --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared \
            CC=${{ env.OSXCROSS_HOST }}-clang CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}"
          make -j$(nproc) install && cd ..

          echo "🔨 4/4 Сборка OPENJPEG..."
          git clone --depth 1 https://github.com/uclouvain/openjpeg.git
          cd openjpeg && mkdir build && cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc) install && cd ../..

      - name: 🔨 Build Poppler Static
        run: |
          export PATH="${{ env.OSXCROSS_TARGET_DIR }}/bin:$PATH"
          git clone --depth 1 https://gitlab.freedesktop.org/poppler/poppler.git
          cd poppler && mkdir build && cd build
          
          # Мы добавляем -DENABLE_UNSTABLE_API_ABI_HEADERS=ON так как некоторые утилиты это любят
          # И жестко указываем путь к нашему свежесобранному Freetype
          cmake .. -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/poppler_dist" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_CPP_LIB=OFF \
            -DENABLE_GLIB=OFF -DENABLE_QT5=OFF -DENABLE_QT6=OFF -DENABLE_BOOST=OFF \
            -DENABLE_UTILS=ON -DENABLE_CMS='none' -DENABLE_LIBOPENJPEG='openjpeg2' \
            -DCMAKE_PREFIX_PATH=${{ env.INSTALL_DIR }} \
            -DFREETYPE_INCLUDE_DIR_ft2build=${{ env.INSTALL_DIR }}/include/freetype2 \
            -DFREETYPE_LIBRARY=${{ env.INSTALL_DIR }}/lib/libfreetype.a \
            -DCMAKE_C_FLAGS="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
            -DCMAKE_CXX_FLAGS="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}"
          
          make -j$(nproc) install

      - name: ✅ Finalize
        run: |
          echo "🔍 Проверка бинарников..."
          ls -lh ${{ github.workspace }}/poppler_dist/bin/
          cd ${{ github.workspace }}/poppler_dist/bin/
          tar -cvzf ../../poppler-static-high-sierra.tar.gz *

      - name: ⬆️ Upload
        uses: actions/upload-artifact@v4
        with:
          name: poppler-static-high-sierra
          path: poppler-utils-high-sierra.tar.gz
