name: Poppler_HighSierra_Static_Expert
on: [push, workflow_dispatch]

env:
  CACHE_REV: "p105"
  OSXCROSS_ROOT: /home/runner/osxcross
  OSXCROSS_TARGET_DIR: /home/runner/osxcross/target
  INSTALL_DIR: ${{ github.workspace }}/deps_dist
  MACOS_MIN_VER: "10.13"
  SDK_VERSION: "10.15"
  OSXCROSS_TARGET: "darwin19"
  OSXCROSS_HOST: "x86_64-apple-darwin19"

jobs:
  prepare_toolchain:
    runs-on: ubuntu-22.04
    steps:
      - name: ♻️ Restore Osxcross
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}

      - name: 🔨 Build Osxcross
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          mkdir -p tarballs
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/${{ env.SDK_VERSION }}/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz \
               -o tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz
          UNATTENDED=1 OSX_VERSION_MIN=${{ env.MACOS_MIN_VER }} ./build.sh

  build_poppler:
    needs: prepare_toolchain
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install Host Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm cmake make pkg-config gperf libtool automake gettext autopoint

      - name: ♻️ Restore Osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}
          fail-on-cache-miss: true

      - name: ⚙️ Fix Toolchain Environment
        run: |
          echo "${{ env.OSXCROSS_TARGET_DIR }}/bin" >> $GITHUB_PATH
          {
            echo "OSXCROSS_CONF=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake"
            echo "OSXCROSS_SDK=macosx${{ env.SDK_VERSION }}"
            echo "MACOSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }}"
            echo "PKG_CONFIG_LIBDIR=${{ env.INSTALL_DIR }}/lib/pkgconfig"
            echo "PKG_CONFIG_SYSROOT_DIR=/"
            # 💡 Глобальная подсказка для CMake
            echo "CMAKE_COMMON_FLAGS=-DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake -DCMAKE_PREFIX_PATH=${{ env.INSTALL_DIR }} -DCMAKE_FIND_ROOT_PATH=${{ env.INSTALL_DIR }}"
          } >> $GITHUB_ENV

      - name: 📚 Build Dependencies (The Titanium Chain)
        run: |
          export PATH="${{ env.OSXCROSS_TARGET_DIR }}/bin:$PATH"
          mkdir -p ${{ env.INSTALL_DIR }}
          
          echo "🔨 1/6 Сборка ZLIB..."
          cd ${{ github.workspace }}
          rm -rf zlib
          git clone --depth 1 https://github.com/madler/zlib.git
          cd zlib
          CC=${{ env.OSXCROSS_HOST }}-clang AR=${{ env.OSXCROSS_HOST }}-ar RANLIB=${{ env.OSXCROSS_HOST }}-ranlib ./configure --prefix=${{ env.INSTALL_DIR }} --static
          make -j$(nproc) install

          echo "🔨 2/6 Сборка LIBPNG..."
          cd ${{ github.workspace }}
          rm -rf libpng
          git clone --depth 1 https://github.com/glennrp/libpng.git
          cd libpng && mkdir build && cd build
          cmake .. -G "Unix Makefiles" ${{ env.CMAKE_COMMON_FLAGS }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DPNG_SHARED=OFF -DPNG_TESTS=OFF -DPNG_TOOLS=OFF
          make -j$(nproc) install

          echo "🔨 3/6 Сборка FREETYPE..."
          cd ${{ github.workspace }}
          rm -rf freetype
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git
          cd freetype && mkdir build && cd build
          cmake .. -G "Unix Makefiles" ${{ env.CMAKE_COMMON_FLAGS }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release \
            -DFT_WITH_ZLIB=ON -DFT_WITH_BZIP2=OFF -DFT_WITH_PNG=ON
          make -j$(nproc) install

          echo "🔨 4/6 Сборка EXPAT..."
          cd ${{ github.workspace }}
          rm -rf libexpat
          git clone --depth 1 https://github.com/libexpat/libexpat.git
          cd libexpat/expat && mkdir build && cd build
          cmake .. -G "Unix Makefiles" ${{ env.CMAKE_COMMON_FLAGS }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DBUILD_shared=OFF -DEXPAT_BUILD_EXAMPLES=OFF -DEXPAT_BUILD_TESTS=OFF -DEXPAT_BUILD_TOOLS=OFF
          make -j$(nproc) install

          echo "🔨 5/6 Сборка FONTCONFIG..."
          cd ${{ github.workspace }}
          rm -rf fontconfig
          git clone --depth 1 https://gitlab.freedesktop.org/fontconfig/fontconfig.git
          cd fontconfig
          ./autogen.sh --sysconfdir=/etc --localstatedir=/var --disable-docs
          ./configure --host=${{ env.OSXCROSS_HOST }} --prefix=${{ env.INSTALL_DIR }} \
            --enable-static --disable-shared --disable-libxml2 \
            EXPAT_CFLAGS="-I${{ env.INSTALL_DIR }}/include" \
            EXPAT_LIBS="-L${{ env.INSTALL_DIR }}/lib -lexpat" \
            FREETYPE_CFLAGS="-I${{ env.INSTALL_DIR }}/include/freetype2" \
            FREETYPE_LIBS="-L${{ env.INSTALL_DIR }}/lib -lfreetype" \
            ZLIB_CFLAGS="-I${{ env.INSTALL_DIR }}/include" \
            ZLIB_LIBS="-L${{ env.INSTALL_DIR }}/lib -lz"
          make -j$(nproc) install

          echo "🔨 6/6 Сборка OPENJPEG..."
          cd ${{ github.workspace }}
          rm -rf openjpeg
          git clone --depth 1 https://github.com/uclouvain/openjpeg.git
          cd openjpeg && mkdir build && cd build
          cmake .. -G "Unix Makefiles" ${{ env.CMAKE_COMMON_FLAGS }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc) install

      - name: 🔨 Build Poppler Static
        run: |
          export PATH="${{ env.OSXCROSS_TARGET_DIR }}/bin:$PATH"
          cd ${{ github.workspace }}
          rm -rf poppler
          git clone --depth 1 https://gitlab.freedesktop.org/poppler/poppler.git
          cd poppler && mkdir build && cd build
          
          cmake .. -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/poppler_dist" \
            -DCMAKE_PREFIX_PATH=${{ env.INSTALL_DIR }} \
            -DCMAKE_FIND_ROOT_PATH=${{ env.INSTALL_DIR }} \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_CPP_LIB=OFF \
            -DENABLE_UTILS=ON -DENABLE_CMS='none' -DENABLE_LIBOPENJPEG='openjpeg2' \
            -DENABLE_LCMS=OFF -DENABLE_LIBCURL=OFF -DENABLE_LIBTIFF=OFF \
            -DCMAKE_C_FLAGS="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
            -DCMAKE_CXX_FLAGS="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}"
          
          make -j$(nproc) install

      - name: ✅ Finalize
        run: |
          cd ${{ github.workspace }}/poppler_dist/bin/
          tar -cvzf ../../poppler-static-high-sierra.tar.gz *

      - name: ⬆️ Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: poppler-static-high-sierra
          path: poppler-static-high-sierra.tar.gz
