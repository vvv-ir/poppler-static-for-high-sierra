name: Golden_Poppler_Builder

on:
  push: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: ubuntu-22.04
    steps:
      - name: 01_Prepare_Toolchain
        run: |
          # Устанавливаем базовые системные либы, которые могут понадобиться линковщику
          sudo apt-get update
          sudo apt-get install -y libxml2 uuid-dev libssl-dev libbz2-1.0 zlib1g
          
          sudo mkdir -p /opt/toolchain
          # Скачиваем твой рабочий 84-мегабайтный FAT-тулчейн
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v2.0-full/osxcross-universal-10.15-FULL.tar.xz" \
               | sudo tar -xJ -C /opt/toolchain
          
          # Прописываем пути к бинарникам (компиляторам)
          echo "/opt/toolchain/bin" >> $GITHUB_PATH
          
          # КЛЮЧЕВОЙ ФИКС: Указываем системе, где лежат libxar.so.1 и libtapi.so
          echo "LD_LIBRARY_PATH=/opt/toolchain/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          
          sudo chown -R $USER:$USER /opt/toolchain

      - name: 02_Build_Dependencies (Zlib, PNG, Freetype)
        run: |
          export DEPS_DIR=/opt/toolchain/deps
          mkdir -p $DEPS_DIR
          export CHOST=x86_64-apple-darwin19
          export CC="$CHOST-clang"
          export CXX="$CHOST-clang++"
          export RANLIB="$CHOST-ranlib"

          # 1. ZLIB (уже умеем)
          git clone --depth 1 https://github.com/madler/zlib.git
          cd zlib && ./configure --static --prefix=$DEPS_DIR && make -j$(nproc) install && cd ..

          # 2. LIBPNG (исправлено)
          git clone --depth 1 https://github.com/glennrp/libpng.git
          cd libpng && mkdir build && cd build
          cmake .. -DCMAKE_SYSTEM_NAME=Darwin -DCMAKE_C_COMPILER=$CC -DCMAKE_INSTALL_PREFIX=$DEPS_DIR \
                   -DPNG_SHARED=OFF -DPNG_TESTS=OFF -DZLIB_ROOT=$DEPS_DIR
          make -j$(nproc) install && cd ../..

          # 3. FREETYPE (Исправлено: отключаем Brotli и Bzip2)
          git clone --depth 1 https://gitlab.freedesktop.org/freetype/freetype.git
          cd freetype && mkdir build && cd build
          cmake .. -DCMAKE_SYSTEM_NAME=Darwin \
                   -DCMAKE_C_COMPILER=$CC \
                   -DCMAKE_INSTALL_PREFIX=$DEPS_DIR \
                   -DBUILD_SHARED_LIBS=OFF \
                   -DFT_DISABLE_ZLIB=OFF \
                   -DFT_DISABLE_PNG=OFF \
                   -DFT_DISABLE_BROTLI=ON \
                   -DFT_DISABLE_BZIP2=ON \
                   -DZLIB_ROOT=$DEPS_DIR \
                   -DPNG_ROOT=$DEPS_DIR
          make -j$(nproc) install && cd ../..

      - name: 03_Build_Poppler_WITH_IMAGES
        run: |
          export DEPS_DIR=/opt/toolchain/deps
          export CHOST=x86_64-apple-darwin19
          
          git clone --depth 1 --branch poppler-22.04.0 https://gitlab.freedesktop.org/poppler/poppler.git
          cd poppler
          
          # Убираем только REQUIRED, чтобы CMake не паниковал раньше времени
          sed -i 's/REQUIRED//g' CMakeLists.txt
          
          mkdir build && cd build
          
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER="x86_64-apple-darwin19-clang" \
            -DCMAKE_CXX_COMPILER="x86_64-apple-darwin19-clang++" \
            -DCMAKE_INSTALL_PREFIX="/opt/toolchain/poppler_dist" \
            -DCMAKE_PREFIX_PATH=$DEPS_DIR \
            -DFONT_CONFIGURATION=generic \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_UTILS=ON \
            -DENABLE_CPP=OFF \
            -DENABLE_GLIB=OFF \
            -DENABLE_QT5=OFF \
            -DENABLE_QT6=OFF \
            -DENABLE_CMS=none \
            -DENABLE_LIBOPENJPEG=none \
            -DENABLE_LIBTIFF=OFF \
            -DENABLE_GPGME=OFF \
            -DENABLE_LCMS=OFF \
            -DENABLE_LIBCURL=OFF \
            # --- ВКЛЮЧАЕМ ПОДДЕРЖКУ КАРТИНОК ---
            -DENABLE_LIBPNG=ON \
            -DPNG_PNG_INCLUDE_DIR="$DEPS_DIR/include" \
            -DPNG_LIBRARY="$DEPS_DIR/lib/libpng.a" \
            -DENABLE_LIBJPEG=libjpeg \
            -DJPEG_INCLUDE_DIR="$DEPS_DIR/include" \
            -DJPEG_LIBRARY="$DEPS_DIR/lib/libjpeg.a" \
            -DZLIB_INCLUDE_DIR="$DEPS_DIR/include" \
            -DZLIB_LIBRARY="$DEPS_DIR/lib/libz.a" \
            # --- ФЛАГИ ЛИНКОВКИ (Тот самый твой флаг) ---
            -DCMAKE_EXE_LINKER_FLAGS="-L$DEPS_DIR/lib -lpng -ljpeg -lz" \
            -DCMAKE_DISABLE_FIND_PACKAGE_Fontconfig=ON \
            -DCMAKE_DISABLE_FIND_PACKAGE_Cairo=ON
            
          make -j$(nproc)
          make install

      - name: 04_Verify_Poppler
        run: |
          echo "=== ПРОВЕРКА PDFINFO ==="
          file /opt/toolchain/poppler_dist/bin/pdfinfo

      - name: 05_Release_Poppler
        uses: softprops/action-gh-release@v1
        with:
          tag_name: poppler-v1.0
          name: "Poppler Static Binary (macOS 10.15)"
          files: |
            /opt/toolchain/poppler_dist/bin/pdfinfo
            /opt/toolchain/poppler_dist/lib/libpoppler.a
