name: 📄 Poppler_HighSierra_Manual_Control

on:
  push:
  workflow_dispatch:

env:
  # Жёстко заданные константы — фундамент (No Magic)
  OSXCROSS_HOST: "x86_64-apple-darwin19"
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  OSXCROSS_ROOT: "/opt/osxcross"
  INSTALL_DIR: "${{ github.workspace }}/deps_dist"
  TOOLCHAIN_FILE: "/opt/osxcross/toolchain.cmake"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 1: Развертывание тулчейна (Ручная распаковка)
      # ════════════════════════════════════════════════════════════════════════
      - name: 🚀 Deploy Toolchain
        run: |
          sudo mkdir -p ${{ env.OSXCROSS_ROOT }}
          # --strip-components=1 гарантирует, что bin/ лежит прямо в /opt/osxcross/
          curl -L "https://github.com/vvv-ir/macos10.15-Catalina-cross-builder/releases/download/toolchain-v1.0/osxcross-universal-10.13.tar.xz" \
               | sudo tar -xJ -C ${{ env.OSXCROSS_ROOT }} --strip-components=1
          
          # Проверяем физическое наличие файла (Anti-Hallucination Check)
          if [ ! -f "${{ env.TOOLCHAIN_FILE }}" ]; then echo "Ошибка: Toolchain file NOT FOUND!"; exit 1; fi

      - name: 🔧 Install System Tools
        run: sudo apt-get update && sudo apt-get install -y cmake gperf libtool automake autoconf-archive pkg-config

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: Сборка ZLIB (С ручным указанием компилятора)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build ZLIB
        run: |
          mkdir -p ${{ env.INSTALL_DIR }}
          git clone --depth 1 https://github.com/madler/zlib.git
          cd zlib
          # Явно выставляем инструменты для configure
          CHOST=${{ env.OSXCROSS_HOST }} \
          CC=${{ env.OSXCROSS_ROOT }}/bin/${{ env.OSXCROSS_HOST }}-clang \
          RANLIB=${{ env.OSXCROSS_ROOT }}/bin/${{ env.OSXCROSS_HOST }}-ranlib \
          ./configure --prefix=${{ env.INSTALL_DIR }} --static
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3: Сборка LIBPNG (С полным контролем CMake)
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build LIBPNG
        run: |
          git clone --depth 1 https://github.com/glennrp/libpng.git
          cd libpng && mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DOSXCROSS_HOST=${{ env.OSXCROSS_HOST }} \
            -DPNG_SHARED=OFF \
            -DPNG_TESTS=OFF \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_ROOT }}/bin/${{ env.OSXCROSS_HOST }}-clang \
            -DZLIB_INCLUDE_DIR=${{ env.INSTALL_DIR }}/include \
            -DZLIB_LIBRARY=${{ env.INSTALL_DIR }}/lib/libz.a
          make -j$(nproc) install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: Сборка POPPLER (Максимальный контроль)
      # ════════════════════════════════════════════════════════════════════════
      - name: 🔨 Build Poppler
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/poppler/poppler.git
          cd poppler && mkdir build && cd build
          
          # Мы не верим, что Poppler сам найдет Zlib или PNG. Мы указываем их за руку.
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/poppler_dist" \
            -DOSXCROSS_HOST=${{ env.OSXCROSS_HOST }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_UTILS=ON \
            -DENABLE_GLIB=OFF \
            -DENABLE_QT5=OFF \
            -DENABLE_QT6=OFF \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_ROOT }}/bin/${{ env.OSXCROSS_HOST }}-clang \
            -DCMAKE_CXX_COMPILER=${{ env.OSXCROSS_ROOT }}/bin/${{ env.OSXCROSS_HOST }}-clang++ \
            -DCMAKE_PREFIX_PATH=${{ env.INSTALL_DIR }} \
            -DZLIB_ROOT=${{ env.INSTALL_DIR }} \
            -DPNG_PNG_INCLUDE_DIR=${{ env.INSTALL_DIR }}/include
          
          make -j$(nproc) install

      - name: ✅ Finalize
        run: |
          tar -cvzf poppler-high-sierra-final.tar.gz -C ${{ github.workspace }}/poppler_dist/bin .

      - name: ⬆️ Upload
        uses: actions/upload-artifact@v4
        with:
          name: poppler-final
          path: poppler-high-sierra-final.tar.gz
