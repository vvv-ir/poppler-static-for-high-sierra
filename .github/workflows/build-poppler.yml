# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                   POPPLER STATIC BUILDER ДЛЯ macOS 10.13                   ║
# ║                                                                            ║
# ║  Этот workflow собирает СТАТИЧЕСКИЕ утилиты Poppler (pdfimages, и др.)    ║
# ║  которые не требуют установки сторонних библиотек на целевом Mac.         ║
# ║                                                                            ║
# ║  Включает:                                                                ║
# ║  - pdfimages, pdftoppm, pdfinfo, pdftotext и др.                         ║
# ║  - Поддержка JPEG, PNG и JPEG2000 (OpenJPEG)                             ║
# ║  - Полная статическая линковка всех зависимостей                         ║
# ╚════════════════════════════════════════════════════════════════════════════╝

name: Poppler_HighSierra_Static_Expert
on: [push, workflow_dispatch]

env:
  CACHE_REV: "p101"
  OSXCROSS_ROOT: /home/runner/osxcross
  OSXCROSS_TARGET_DIR: /home/runner/osxcross/target
  INSTALL_DIR: ${{ github.workspace }}/deps_dist
  MACOS_MIN_VER: "10.13"
  SDK_VERSION: "10.15"
  OSXCROSS_TARGET: "darwin19"
  OSXCROSS_HOST: "x86_64-apple-darwin19"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 1: Подготовка окружения
      # ════════════════════════════════════════════════════════════════════════
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Install Build Tools (Host)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-dev uuid-dev libssl-dev nasm yasm pkg-config \
            make cmake git curl wget build-essential automake libtool python3

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: Развертывание Toolchain (Osxcross)
      # ════════════════════════════════════════════════════════════════════════
      - name: ♻️ Restore/Build Osxcross
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}

      - name: 🏗️ Setup Osxcross (if no cache)
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          mkdir -p tarballs
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/${{ env.SDK_VERSION }}/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz \
               -o tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz
          UNATTENDED=1 OSX_VERSION_MIN=${{ env.MACOS_MIN_VER }} ./build.sh

      - name: ⚙️ Export Path
        run: |
          echo "${{ env.OSXCROSS_TARGET_DIR }}/bin" >> $GITHUB_PATH
          echo "OSXCROSS_CONF=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake" >> $GITHUB_ENV

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3: Сборка фундаметальных библиотек (Dependencies)
      # Мы собираем их статически, чтобы Poppler мог их "всосать" в себя.
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build Dependencies (Static)
        run: |
          mkdir -p ${{ env.INSTALL_DIR }}
          
          # --- LIBJPEG-TURBO (Работа с JPEG) ---
          git clone --depth 1 https://github.com/libjpeg-turbo/libjpeg-turbo.git
          cd libjpeg-turbo && mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DENABLE_SHARED=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) install && cd ../..

          # --- LIBPNG (Работа с PNG) ---
          git clone --depth 1 https://github.com/glennrp/libpng.git
          cd libpng
          ./autogen.sh
          ./configure --host=${{ env.OSXCROSS_HOST }} --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared \
            CC=${{ env.OSXCROSS_HOST }}-clang CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}"
          make -j$(nproc) install && cd ..

          # --- OPENJPEG (Критически важно для JPEG2000 в PDF) ---
          git clone --depth 1 https://github.com/uclouvain/openjpeg.git
          cd openjpeg && mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc) install && cd ../..

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: Сборка POPPLER
      # Основной этап: отключаем всё лишнее (UI, тесты), оставляем только утилиты.
      # ════════════════════════════════════════════════════════════════════════
      - name: 🔨 Build Poppler Static Utils
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/poppler/poppler.git
          cd poppler && mkdir build && cd build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_CONF }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/poppler_dist" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_CPP_LIB=OFF \
            -DENABLE_GLIB=OFF \
            -DENABLE_QT5=OFF \
            -DENABLE_QT6=OFF \
            -DENABLE_UTILS=ON \
            -DENABLE_CMS='none' \
            -DENABLE_LIBOPENJPEG='openjpeg2' \
            -DCMAKE_PREFIX_PATH=${{ env.INSTALL_DIR }} \
            -DCMAKE_C_FLAGS="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
            -DCMAKE_CXX_FLAGS="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}"
          
          make -j$(nproc)
          make install

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 5: Проверка и упаковка
      # ════════════════════════════════════════════════════════════════════════
      - name: ✅ Verify and Upload
        run: |
          echo "🔍 Проверка бинарника pdfimages:"
          file ${{ github.workspace }}/poppler_dist/bin/pdfimages
          
          # Создаем чистый архив только с инструментами
          cd ${{ github.workspace }}/poppler_dist/bin/
          tar -cvzf ../../poppler-utils-high-sierra.tar.gz *

      - name: ⬆️ Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: poppler-static-high-sierra
          path: poppler-utils-high-sierra.tar.gz

      - name: 🔍 Debug Info on Failure
        if: failure()
        run: |
          echo "❌ Ошибка сборки. Состояние зависимостей:"
          ls -R ${{ env.INSTALL_DIR }}
